# Notify the off-repo reference-policy scanner that this PR needs scanning.
#
# Why this exists:
#   The scanner lives outside this repository and posts a check-run back
#   here. Without this workflow, that check only updates when the scanner's
#   scheduled run fires, and GitHub Actions cron timing is nondeterministic
#   on low-activity repositories.
#
# Threat model:
#   Scanner policy contents stay outside this repository. The scanner posts
#   only a generic pass/fail summary back to PRs here.
#
#   The App token is scoped to Actions access on the scanner repository.
#   That's strictly less than the `contents: write` permission that
#   `repository_dispatch` would require. Rotate credentials on schedule.
#
# Gating:
#   The job is gated on `vars.LEAK_DISPATCH_ENABLED == '1'` so it stays
#   dormant until the App, secrets, and repository variables are configured.
#   The scanner's scheduled run remains a safety net.

name: Notify leak scanner

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr-number:
        description: PR number to dispatch a scan for
        required: true

permissions: {}

concurrency:
  group: notify-leak-scanner-pr-${{ github.event.pull_request.number || github.event.inputs.pr-number }}
  cancel-in-progress: true

jobs:
  dispatch:
    if: vars.LEAK_DISPATCH_ENABLED == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate scanner dispatch configuration
        env:
          TARGET_OWNER: ${{ vars.LEAK_SCAN_TARGET_OWNER }}
          TARGET_REPOSITORY: ${{ vars.LEAK_SCAN_TARGET_REPOSITORY }}
          TARGET_WORKFLOW: ${{ vars.LEAK_SCAN_TARGET_WORKFLOW }}
          TARGET_REF: ${{ vars.LEAK_SCAN_TARGET_REF }}
        run: |
          set -euo pipefail
          : "${TARGET_OWNER:?LEAK_SCAN_TARGET_OWNER variable is required}"
          : "${TARGET_REPOSITORY:?LEAK_SCAN_TARGET_REPOSITORY variable is required}"
          : "${TARGET_WORKFLOW:?LEAK_SCAN_TARGET_WORKFLOW variable is required}"
          : "${TARGET_REF:?LEAK_SCAN_TARGET_REF variable is required}"

      - name: Generate App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.LEAK_SCAN_DISPATCH_APP_ID }}
          private-key: ${{ secrets.LEAK_SCAN_DISPATCH_APP_KEY }}
          owner: ${{ vars.LEAK_SCAN_TARGET_OWNER }}
          repositories: ${{ vars.LEAK_SCAN_TARGET_REPOSITORY }}

      - name: Dispatch scan
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr-number }}
          TARGET_OWNER: ${{ vars.LEAK_SCAN_TARGET_OWNER }}
          TARGET_REPOSITORY: ${{ vars.LEAK_SCAN_TARGET_REPOSITORY }}
          TARGET_WORKFLOW: ${{ vars.LEAK_SCAN_TARGET_WORKFLOW }}
          TARGET_REF: ${{ vars.LEAK_SCAN_TARGET_REF }}
        run: |
          set -euo pipefail
          echo "Dispatching scan for PR #${PR_NUMBER}"
          gh api -X POST \
            "repos/${TARGET_OWNER}/${TARGET_REPOSITORY}/actions/workflows/${TARGET_WORKFLOW}/dispatches" \
            -f "ref=${TARGET_REF}" \
            -f "inputs[pr-number]=${PR_NUMBER}"
          echo "Dispatched scanner workflow."
