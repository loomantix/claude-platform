name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: Python lint + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install pyyaml + ruff
        run: python3 -m pip install 'pyyaml==6.0.2' 'ruff==0.9.10'
      - name: Compile-check every Python source
        run: |
          set -euo pipefail
          mapfile -t pyfiles < <(git ls-files '*.py')
          if [ "${#pyfiles[@]}" -eq 0 ]; then
            echo "(no Python files found)"
            exit 0
          fi
          python3 -m py_compile "${pyfiles[@]}"
      - name: Ruff lint
        run: ruff check .

  python-types-and-tests:
    name: Python types + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install pinned tooling
        run: |
          python3 -m pip install \
            'mypy==1.13.0' \
            'pyyaml==6.0.2' \
            'types-PyYAML==6.0.12.20240917' \
            'pytest==8.3.4' \
            'pytest-cov==6.0.0'
      - name: mypy --strict (config from pyproject.toml)
        run: python3 -m mypy
      - name: Configure git identity (parse_status tests use a fixture git repo)
        run: |
          git config --global user.email "ci@example.invalid"
          git config --global user.name "CI"
          git config --global init.defaultBranch main
      - name: Run pytest + write coverage data
        run: python3 -m pytest tests/ --cov --cov-report=term-missing -ra
      # Per-file gate matches the security contract: a future refactor
      # that spikes one file's coverage can't paper over a regression
      # in the other. The `test -f` precondition is load-bearing —
      # `coverage report --include=<missing>` exits 0 with "No data to
      # report", silently passing the gate if a file gets renamed.
      - name: Coverage gate — sync-engine.py >=80%
        run: |
          test -f scripts/sync-engine.py
          python3 -m coverage report --include='scripts/sync-engine.py' --fail-under=80
      - name: Coverage gate — create-signed-commit.py >=80%
        run: |
          test -f scripts/create-signed-commit.py
          python3 -m coverage report --include='scripts/create-signed-commit.py' --fail-under=80

  shell:
    name: Shell syntax + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: bash -n every shell script
        run: |
          set -euo pipefail
          mapfile -t shfiles < <(git ls-files '*.sh')
          for f in "${shfiles[@]}"; do
            bash -n "$f"
          done
      - name: shellcheck (warnings allowed; errors fail)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          severity: error

  yaml:
    name: YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python3 -m pip install 'pyyaml==6.0.2'
      - name: Parse every YAML file
        run: |
          set -euo pipefail
          mapfile -t ymlfiles < <(git ls-files '*.yml' '*.yaml')
          for f in "${ymlfiles[@]}"; do
            # `.template` files often contain literal `<placeholders>` that
            # are still valid YAML — parse-only check is sufficient.
            python3 -c "import sys, yaml; yaml.safe_load(open(sys.argv[1]))" "$f"
          done

  format:
    name: Prettier check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Prettier --check
        run: npx --yes prettier@3.8.3 --check .

  skill-content:
    name: Skill content policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Self-test the lint patterns
        run: python3 .claude/lint-skill-content.py --self-test
      - name: Lint changed skill/agent content
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            if [ -z "${GITHUB_BASE_REF:-}" ]; then
              echo "GITHUB_BASE_REF empty for pull_request event — aborting." >&2
              exit 1
            fi
            git fetch --no-tags origin "${GITHUB_BASE_REF}"
            base="origin/${GITHUB_BASE_REF}"
          else
            base="HEAD~1"
          fi
          python3 .claude/lint-skill-content.py --base "$base"

  claude-cli-invocations:
    name: claude CLI invocation policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # pyyaml is required by `_synced_shell_sources()` to derive scope
      # from `scripts/sync-targets.yml`.
      - run: python3 -m pip install 'pyyaml==6.0.2'
      - name: Self-test the lint patterns
        run: python3 .claude/lint-claude-cli-invocations.py --self-test
      # Whole-tree scan, not diff-based — resists splitting a weaponizing
      # change across two PRs to escape the gate.
      - name: Lint synced shell scripts for `claude --` invocations
        run: python3 .claude/lint-claude-cli-invocations.py

  sync-targets:
    name: sync-targets.yml matches schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python3 -m pip install 'pyyaml==6.0.2'
      - name: Validate the canonical manifest parses + has expected shape
        run: |
          python3 - <<'PY'
          import yaml, sys
          doc = yaml.safe_load(open('scripts/sync-targets.yml'))
          targets = doc.get('targets')
          assert isinstance(targets, list) and targets, "targets must be a non-empty list"
          for t in targets:
              assert isinstance(t, dict), f"non-mapping target: {t!r}"
              if t.get('delete'):
                  assert 'destination' in t, f"delete target missing destination: {t!r}"
              else:
                  assert 'source' in t and 'destination' in t, f"copy target missing keys: {t!r}"
          print(f"OK: {len(targets)} targets")
          PY
