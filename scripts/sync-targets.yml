# Canonical sync manifest for claude-platform.
#
# `sync-engine.py` reads this file from the upstream checkout (this repo, or
# a fork of it) to learn which files to copy into a consumer repo, and which
# `<<KEY>>` placeholders to substitute from the consumer's
# `.platform-config.yml`.
#
# `substitutions: []` means verbatim copy. `delete: true` causes the engine
# to remove the destination from the consumer (and prune empty parent
# directories) — use this to retire a previously-synced file across all
# consumers. `mode` (e.g. `"0755"`) sets the destination permissions.
#
# Adding a new file to the sync surface = add an entry here. Consumers that
# don't want a particular file can opt out via `skip_targets` in their own
# `.platform-config.yml`; forks that want to drop or add files entirely can
# edit this manifest in the fork.

targets:
  # Claude Code skills — checked into consumer repo so teammates without the
  # global install can still invoke them. Devs who installed via
  # `scripts/install-skills.sh` will resolve from `~/.claude/skills/` first;
  # the in-repo copy is the fallback for everyone else and for CI contexts.
  - source: .claude/skills/issues/SKILL.md
    destination: .claude/skills/issues/SKILL.md
    substitutions: []

  - source: .claude/skills/issues/scripts/ready.py
    destination: .claude/skills/issues/scripts/ready.py
    substitutions: []
    mode: '0755'

  - source: .claude/skills/issues/scripts/link.py
    destination: .claude/skills/issues/scripts/link.py
    substitutions: []
    mode: '0755'

  - source: .claude/skills/refactorpass/SKILL.md
    destination: .claude/skills/refactorpass/SKILL.md
    substitutions: []

  - source: .claude/skills/grill/SKILL.md
    destination: .claude/skills/grill/SKILL.md
    substitutions: []

  - source: .claude/skills/deepgrill/SKILL.md
    destination: .claude/skills/deepgrill/SKILL.md
    substitutions: []

  - source: .claude/skills/reviewit/SKILL.md
    destination: .claude/skills/reviewit/SKILL.md
    substitutions: []

  - source: .claude/skills/copilot-review/SKILL.md
    destination: .claude/skills/copilot-review/SKILL.md
    substitutions: []

  - source: .claude/skills/feature-dev/SKILL.md
    destination: .claude/skills/feature-dev/SKILL.md
    substitutions: []

  - source: .claude/skills/agent-loop/SKILL.md
    destination: .claude/skills/agent-loop/SKILL.md
    substitutions: []

  - source: .claude/skills/agent-loop/scripts/agent-loop.sh
    destination: .claude/skills/agent-loop/scripts/agent-loop.sh
    substitutions: []
    mode: '0755'

  # /agent-loop expects `agent-loop-instructions.md` at the consumer's repo
  # root. `create_if_missing: true` bootstraps the file from this template
  # on first sync, then leaves it alone — consumer customizations made
  # after the initial sync survive every subsequent run.
  - source: .claude/skills/agent-loop/agent-loop-instructions.md.template
    destination: agent-loop-instructions.md
    substitutions: []
    create_if_missing: true

  # Consumer-owned Claude prompt. `create_if_missing: true` bootstraps it
  # once; later upstream edits to `prompt.txt.template` no longer reach
  # already-onboarded consumers.
  - source: .claude/skills/agent-loop/prompt.txt.template
    destination: .claude/skills/agent-loop/prompt.txt
    substitutions: []
    create_if_missing: true

  # /backlog-refinement — curates the `dev: agent` queue that /agent-loop
  # consumes, and runs the post-loop RCA that sharpens the rubric from every
  # bail. SKILL.md + scripts are verbatim (overwrite); RUBRIC.md and
  # LEARNINGS.md are consumer-owned (bootstrapped from templates, then each
  # repo customizes the disqualifiers and accumulates its own learnings).
  - source: .claude/skills/backlog-refinement/SKILL.md
    destination: .claude/skills/backlog-refinement/SKILL.md
    substitutions: []

  - source: .claude/skills/backlog-refinement/scripts/candidates.py
    destination: .claude/skills/backlog-refinement/scripts/candidates.py
    substitutions: []
    mode: '0755'

  - source: .claude/skills/backlog-refinement/scripts/bail-report.py
    destination: .claude/skills/backlog-refinement/scripts/bail-report.py
    substitutions: []
    mode: '0755'

  # The agent-readiness rubric (criteria + disqualifier taxonomy) is the
  # source of truth shared with /agent-loop. `create_if_missing: true` lets
  # each repo tune its §3 disqualifiers (e.g. a repo-specific sensitive-path
  # exclusion) without upstream clobbering them.
  - source: .claude/skills/backlog-refinement/RUBRIC.md.template
    destination: .claude/skills/backlog-refinement/RUBRIC.md
    substitutions: []
    create_if_missing: true

  # Append-only RCA log — each repo accumulates its own learnings corpus.
  - source: .claude/skills/backlog-refinement/LEARNINGS.md.template
    destination: .claude/skills/backlog-refinement/LEARNINGS.md
    substitutions: []
    create_if_missing: true

  # Custom Claude Code agents that the synced skills depend on. /feature-dev
  # invokes code-explorer, code-architect, and code-reviewer. Without these
  # in each consumer's .claude/agents/, those skills fail with "agent not found".
  - source: .claude/agents/code-explorer.md
    destination: .claude/agents/code-explorer.md
    substitutions: []

  - source: .claude/agents/code-architect.md
    destination: .claude/agents/code-architect.md
    substitutions: []

  - source: .claude/agents/code-reviewer.md
    destination: .claude/agents/code-reviewer.md
    substitutions: []

  # Canonical workflow doc — referenced from each consumer's CLAUDE.md as
  # the source of truth for the AI review flow.
  - source: .claude/REVIEW_WORKFLOW.md
    destination: .claude/REVIEW_WORKFLOW.md
    substitutions: []

  - source: .claude/settings.json
    destination: .claude/settings.json
    substitutions: []

  # Retired-stub deletes — keep these while consumers may still have legacy
  # files from an older sync surface. Each entry can be deleted from this
  # manifest once downstream syncs have processed it.
  - destination: .claude/skills/pushit/SKILL.md
    delete: true
  - destination: .claude/skills/review-cycle/SKILL.md
    delete: true
  - destination: .claude/hooks/check-simplify-state.sh
    delete: true

  # Copilot instructions — generated from the template using the consumer's
  # placeholder values. Result lands at `.github/copilot-instructions.md`.
  - source: .github/copilot-instructions.md.template
    destination: .github/copilot-instructions.md
    substitutions:
      - PROJECT_NAME
      - PROJECT_OVERVIEW
      - CANONICAL_DOCS
      - STACK_TABLE
      - CODE_RULES
      - DOMAIN_RULES
      - REVIEW_FOCUS
      - WHAT_NOT_TO_SUGGEST_EXTRA

  # DCO sign-off check — only relevant for OSS consumers (Apache 2 + DCO is
  # the standard contract). The canonical version uses `git rev-list
  # --no-merges` so "Update branch" merge commits, which lack a
  # Signed-off-by trailer, don't fail the check. Private consumers that
  # don't need DCO opt out via `skip_targets` in their `.platform-config.yml`.
  - source: .github/workflows/dco.yml
    destination: .github/workflows/dco.yml
    substitutions: []
