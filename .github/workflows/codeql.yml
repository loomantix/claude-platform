name: CodeQL

# Sync engine + create-signed-commit run with cross-org org-scoped App
# tokens in the consumer fleet. CodeQL's default Python query suite
# catches taint flows that ruff and mypy don't — explicit defense
# against a logic-bomb landing in this repo while consumers pull from
# it daily.

on:
  push:
    # Push-event scan on main establishes the baseline that GitHub Code
    # Scanning needs to auto-dismiss fixed alerts. Without it, resolved
    # findings linger as stale entries in the Security tab.
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan so a query-suite improvement at upstream catches
    # latent vulnerabilities even if no PR touched the file.
    - cron: '17 9 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python
          queries: +security-extended
      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:python'
