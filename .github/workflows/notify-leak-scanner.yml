# Notifies an off-repo scanner that this PR needs a private-reference scan.
# The scanner posts a `private-reference-policy` check-run back here.
#
# Kill switch: clear `vars.LEAK_DISPATCH_ENABLED` to stop dispatching.

name: Notify leak scanner

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr-number:
        description: PR number to dispatch a scan for
        required: true

permissions: {}

concurrency:
  group: notify-leak-scanner-pr-${{ github.event.pull_request.number || github.event.inputs.pr-number }}
  cancel-in-progress: true

jobs:
  dispatch:
    if: vars.LEAK_DISPATCH_ENABLED == '1'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Generate App installation token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.LEAK_SCAN_DISPATCH_APP_ID }}
          private-key: ${{ secrets.LEAK_SCAN_DISPATCH_APP_KEY }}
          owner: loomantix
          repositories: platform

      - name: Dispatch scan on private repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr-number }}
        run: |
          set -euo pipefail
          echo "Dispatching scan for PR #${PR_NUMBER}"
          gh api -X POST \
            "repos/loomantix/platform/actions/workflows/claude-platform-leak-scan.yml/dispatches" \
            -f ref=main \
            -f "inputs[pr-number]=${PR_NUMBER}"
          echo "Dispatched. Expect 'private-reference-policy' check-run within ~30s."
